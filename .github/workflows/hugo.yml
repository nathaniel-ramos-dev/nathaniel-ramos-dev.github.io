name: Deploy Hugo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - run: hugo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifacts@v3
        with:
          path: ./public

      - uses: actions/deploy-pages@v4
